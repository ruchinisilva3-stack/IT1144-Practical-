<!Doctype html>
<html>
<head>
<title>navigation</title>
<style>
ul{list-style:none;
    padding:0;
    margin:0;
 }
a{text-decoration:none;
}
li{display:inline;
   margin-right:20px;
}

nav{background-color:yellow;
     font-size:30px;
     text-align:center;
     padding:10px;
 }

*box{box-sizzing:border-box;}
.container{background-color:Green;
           display:flex;
           justify-content:space-between;}

.container div{background-color:pink;
            border:5px dotted red;
            padding:20px;
            }

.item {background-color:Green;
       padding:15px;
       border:10px solid red;
       margin:5px;}

ul li a:hover {
  background-color: #111111;}

</style>

</head>
<body  style=background-color:black;>
<h1>my website</h1>
<nav>
<ul>
<li> <a href=#>Home</a></li>
<li> <a href=#>About</a></li>

</ul>

  <div>item 1</div>

</div>
</body>
</html>
